{% extends "base.html" %}

{% block content %}
<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8f9ff);
    padding: 40px;
    color: #333;
}
.analytics-container {
    max-width: 1200px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
}
.header-flex {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}
h1 {
    font-size: 32px;
    color: #2c2c54;
    margin: 0;
}
.filter-group select {
    padding: 12px 20px;
    border-radius: 8px;
    border: 1px solid #e0e0e0;
    font-size: 16px;
    background: #fafafa;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}
.filter-group select:focus {
    outline: none;
    border-color: #6c63ff;
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
}
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}
.stat-card {
    background: linear-gradient(135deg, #6c63ff, #5a54e8);
    color: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 20px rgba(108,99,255,0.3);
    text-align: center;
    transition: transform 0.3s;
}
.stat-card:hover {
    transform: translateY(-5px);
}
.stat-card.secondary {
    background: linear-gradient(135deg, #10b981, #059669);
    box-shadow: 0 10px 20px rgba(16,185,129,0.3);
}
.stat-card.tertiary {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    box-shadow: 0 10px 20px rgba(245,158,11,0.3);
}
.stat-value {
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 10px;
}
.stat-label {
    font-size: 16px;
    opacity: 0.9;
}
.charts-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 30px;
}
.chart-box {
    background: #fafbff;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #f0f0f0;
    box-shadow: 0 5px 15px rgba(0,0,0,0.03);
}
.chart-box h3 {
    margin-top: 0;
    color: #444;
    font-size: 18px;
    margin-bottom: 20px;
    text-align: center;
}
@media(max-width: 900px) {
    .charts-grid {
        grid-template-columns: 1fr;
    }
}
</style>

<div class="analytics-container">
    <div class="header-flex">
        <h1>Analytics Dashboard</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <a href="/admin" style="padding: 12px 20px; background: #666; color: white; text-decoration: none; border-radius: 8px; font-weight: bold;">BACK TO ADMIN</a>
            <div class="filter-group">
                <label for="dept-filter" style="margin-right: 10px; font-weight: bold; color: #555;">Filter by Department:</label>
                <select id="dept-filter" onchange="fetchAnalytics()">
                    <option value="All">All Departments</option>
                    <option value="IT">IT</option>
                    <option value="CSE(AIML)">CSE(AIML)</option>
                    <option value="Mechanical">Mechanical</option>
                    <option value="Electrical">Electrical</option>
                    <option value="ENTC">ENTC</option>
                    <option value="CSE(Cyber Security)">CSE(Cyber Security)</option>
                    <option value="CHEMICAL">CHEMICAL</option>
                </select>
            </div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="total-registrations">0</div>
            <div class="stat-label">Total Registrations</div>
        </div>
        <div class="stat-card secondary">
            <div class="stat-value" id="total-events">0</div>
            <div class="stat-label">Total Events</div>
        </div>
        <div class="stat-card tertiary">
            <div class="stat-value" id="active-users">0</div>
            <div class="stat-label">Currently Online Users</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-box">
            <h3>Registrations by Event</h3>
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>Events by Department</h3>
            <canvas id="doughnutChart"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let barChartInstance = null;
    let doughnutChartInstance = null;

    function fetchAnalytics() {
        const dept = document.getElementById("dept-filter").value;
        
        fetch(`/api/analytics_data?department=${encodeURIComponent(dept)}`)
            .then(res => res.json())
            .then(data => {
                // Update stats
                document.getElementById("total-registrations").innerText = data.total_registrations;
                document.getElementById("total-events").innerText = data.total_events;
                document.getElementById("active-users").innerText = data.active_users;

                // Update Bar Chart (Registrations per event)
                const barCtx = document.getElementById('barChart').getContext('2d');
                if (barChartInstance) barChartInstance.destroy();
                
                barChartInstance = new Chart(barCtx, {
                    type: 'bar',
                    data: {
                        labels: data.events_labels,
                        datasets: [{
                            label: 'Registrations',
                            data: data.events_data,
                            backgroundColor: 'rgba(108, 99, 255, 0.7)',
                            borderColor: 'rgba(108, 99, 255, 1)',
                            borderWidth: 1,
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { precision: 0 }
                            }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });

                // Update Doughnut Chart (Events by Department)
                const doughCtx = document.getElementById('doughnutChart').getContext('2d');
                if (doughnutChartInstance) doughnutChartInstance.destroy();
                
                doughnutChartInstance = new Chart(doughCtx, {
                    type: 'doughnut',
                    data: {
                        labels: data.dept_labels,
                        datasets: [{
                            data: data.dept_data,
                            backgroundColor: [
                                '#6c63ff', '#10b981', '#f59e0b', '#ef4444', 
                                '#3b82f6', '#8b5cf6', '#ec4899', '#14b8a6'
                            ],
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
            });
    }

    // Initial fetch
    document.addEventListener("DOMContentLoaded", fetchAnalytics);
</script>
{% endblock %}
