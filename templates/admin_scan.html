{% extends "base.html" %}
{% block content %}
<div style="max-width: 600px; margin: 80px auto; text-align: center; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); color: #333;">
    <h2>🎫 Scan Event Ticket</h2>
    <p style="margin-bottom: 25px; color: #64748b;">Enter the 12-character Ticket ID found on the student's QR code or email.</p>
    <form method="POST" action="/admin/scan_ticket">
        <input type="text" name="ticket_id" placeholder="Enter Registration Ticket ID" style="padding: 15px; width: 100%; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 1.1rem; text-align: center; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;" required>
        <button type="submit" style="width: 100%; padding: 15px; background: #10b981; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s;" onmouseover="this.style.background='#059669'" onmouseout="this.style.background='#10b981'">Verify & Mark Attended</button>
    </form>
    {% if message %}
        <div style="margin-top: 25px; padding: 15px; border-radius: 8px; background: {% if success %}#d1fae5{% else %}#fee2e2{% endif %}; border: 1px solid {% if success %}#10b981{% else %}#ef4444{% endif %}; color: {% if success %}#047857{% else %}#b91c1c{% endif %}; font-weight: bold;">
            {{ message }}
        </div>
    {% endif %}
    <div style="margin-top: 20px;">
        <a href="/admin" style="color: #4f46e5; text-decoration: none; font-weight: bold;">&larr; Back to Admin Dashboard</a>
    </div>
</div>
{% endblock %}
