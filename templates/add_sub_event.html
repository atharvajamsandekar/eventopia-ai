{% extends "base.html" %}

{% block content %}

<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8f9ff);
    padding: 40px;
    color: #333;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
}

h1 {
    font-size: 32px;
    margin-bottom: 5px;
    color: #2c2c54;
}

p.subtitle {
    color: #666;
    margin-bottom: 30px;
}

form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

label {
    font-weight: 600;
    color: #444;
}

input, textarea, select {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #e0e0e0;
    font-size: 14px;
    background: #fafafa;
    width: 100%;
}

input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #6c63ff;
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    background: white;
}

.button-group {
    display: flex;
    gap: 15px;
    margin-top: 10px;
}

button[type="submit"] {
    flex: 1;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    border: none;
    padding: 14px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
}

button[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.cancel-btn {
    flex: 1;
    background: #e2e8f0;
    color: #334155;
    text-align: center;
    border: none;
    padding: 14px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
    text-decoration: none;
}

.cancel-btn:hover {
    background: #cbd5e1;
    color: #1e293b;
}

.fest-badge {
    display: inline-block;
    background: #e0e7ff;
    color: #4338ca;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 10px;
}
</style>

<div class="container">
    <div>
        <span class="fest-badge">Tech Fest: {{ fest.name }}</span>
    </div>
    <h1>Add Sub-Event</h1>
    <p class="subtitle">Create a new sub-event for <strong>{{ fest.name }}</strong></p>

    <form method="POST" action="/add_event" enctype="multipart/form-data">
        
        <div>
            <label for="name">Event Name</label>
            <input type="text" id="name" name="name" placeholder="E.g., CSS Battle" required>
        </div>
        
        <div>
            <label for="description">Event Description</label>
            <textarea id="description" name="description" placeholder="What is this event about?" required rows="4"></textarea>
        </div>
        
        <div>
            <label for="category">Category</label>
            <select id="category" name="category" required>
                <option value="" disabled selected>-- Select Category --</option>
                <option value="Technical events">Technical Events</option>
                <option value="FUN Games">FUN Games</option>
                <option value="Seminars and Panel">Seminars and Panel</option>
                <option value="Tech expo">Tech Expo</option>
            </select>
        </div>

        <div>
            <label for="department">Department</label>
            <select id="department" name="department" required>
                <option value="{{ fest.department }}" selected>{{ fest.department }} (Default from Fest)</option>
                <option value="All Departments">All Departments</option>
                <option value="IT">IT</option>
                <option value="CSE(AIML)">CSE(AIML)</option>
                <option value="Mechanical">Mechanical</option>
                <option value="Electrical">Electrical</option>
                <option value="ENTC">ENTC</option>
                <option value="CSE(Cyber Security)">CSE(Cyber Security)</option>
                <option value="CHEMICAL">CHEMICAL</option>
            </select>
        </div>

        <!-- HIDDEN TECH FEST ID (but user could visually see it in standard form) -->
        <input type="hidden" name="tech_fest_id" value="{{ fest.id }}">
        
        <div style="display: flex; gap: 15px;">
            <div style="flex:1;">
                <label for="event_date">Event Date</label>
                <input type="date" id="event_date" name="event_date" required>
            </div>
            
            <div style="flex:1;">
                <label for="event_time">Event Time</label>
                <input type="time" id="event_time" name="event_time" required>
            </div>
        </div>

        <div>
            <label for="venue">Venue</label>
            <input type="text" id="venue" name="venue" placeholder="E.g., Lab 2" required>
        </div>
        
        <div>
            <label for="price">Registration Fee (₹) [0 for Free]</label>
            <input type="number" id="price" name="price" value="0" min="0" required>
        </div>
        
        <div>
            <label for="image">Event Image</label>
            <input type="file" id="image" name="image" required style="padding: 8px;">
        </div>

        <div class="button-group">
            <a href="/admin" class="cancel-btn">Cancel</a>
            <button type="submit">Publish Sub-Event</button>
        </div>
    </form>
</div>

{% endblock %}
